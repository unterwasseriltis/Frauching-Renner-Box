<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation des Frauchiger-Renner-Gedankenexperiments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Simulation des Frauchiger-Renner-Gedankenexperiments</h1>
        <button id="resetBtn" class="primary">Simulation zurücksetzen</button>
    </header>
    
    <div class="container">
        <!-- Hauptbereich (links) -->
        <main>
            <div class="main-content">
                <h2 id="phaseTitle">Phase 1: Vorbereitung</h2>
                
                <div id="narrative" class="narrative"></div>
                
                <div id="inputArea" class="input-area"></div>
                
                <!-- Messungsverlauf -->
                <div id="historyContainer" class="history-container"></div>
            </div>
            
            <!-- Fixe Button-Leiste -->
            <div class="button-bar">
                <button id="actionBtn" class="primary">Messung durchführen</button>
                <button id="nextBtn" class="secondary" disabled>Weiter zur nächsten Phase</button>
            </div>
            
            <!-- Phasenbeschreibung – GANZ UNTEN unter den Buttons -->
            <div id="phaseDescription" class="phase-description"></div>
        </main>
        
        <!-- Rechte Sidebar -->
        <aside id="statusPanel" class="status">
            <h2>Aktueller Stand</h2>
            <div id="statusContent"></div>
        </aside>
    </div>
    
    <footer>
        <p>Interaktive Simulation des Frauchiger-Renner-Paradoxons (2018) • Bildungszweck</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
